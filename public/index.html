<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Bombinha OS-PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #007bff; --dark: #0a0a0a; --card: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--dark); 
            height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
            background: radial-gradient(circle at top right, #1e3a5f, #0a0a0a);
        }

        .login-card {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 380px;
            padding: 40px 30px; border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo-area i {
            font-size: 3rem; color: var(--primary); margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 123, 255, 0.5));
        }

        h1 { color: #fff; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        
        input {
            width: 100%; padding: 15px 15px 15px 45px;
            background: #252525; border: 1px solid #333; border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: #2a2a2a; box-shadow: 0 0 10px rgba(0,123,255,0.2); }

        button {
            width: 100%; padding: 15px; background: var(--primary); border: none;
            border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        button:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* Mobile Fix */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-bomb"></i>
            <h1>OS-PRO</h1>
            <p>Bombinha Service Manager</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Senha" required>
            </div>
            <button type="submit">ENTRAR</button>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
